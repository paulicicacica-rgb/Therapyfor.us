name: Generate Multilingual Pages

# Generates pages written natively in each language.
# Uses generate_multilingual.py. Run one language at a time.

on:
  workflow_dispatch:
    inputs:
      language:
        description: "Which language to generate"
        required: true
        type: choice
        default: "spanish"
        options:
          - spanish
          - portuguese
          - polish
          - russian
          - arabic
          - chinese
          - all_languages

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ "${{ github.event.inputs.language }}" = "all_languages" ]; then
            for f in data/lang_*.json; do
              echo "=== $f ==="
              python generate_multilingual.py "$f"
            done
          else
            python generate_multilingual.py "data/lang_${{ github.event.inputs.language }}.json"
          fi
          python build_sitemap.py
      - name: Commit
        run: |
          git config user.name "page-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/
          git commit -m "Generate ${{ github.event.inputs.language }} pages" || echo "No changes"
          git push
