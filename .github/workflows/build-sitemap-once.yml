name: Build Sitemap

# Run this anytime you just want to refresh sitemap.xml without
# generating new pages or rebuilding hubs/trust pages.

on:
  workflow_dispatch:

jobs:
  sitemap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Build sitemap
        run: python build_sitemap.py
      - name: Commit
        run: |
          git config user.name "page-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/sitemap.xml
          git commit -m "Refresh sitemap.xml" || echo "No changes"
          git push
