name: Daily Drip

# Generates a small batch of pages every day so the site grows organically.
# Also runnable by hand. Change the cron time or the limit as you like.

on:
  schedule:
    # Runs every day at 07:00 UTC.
    - cron: "0 7 * * *"
  workflow_dispatch:
    inputs:
      limit:
        description: "How many pages to generate this run"
        required: false
        default: "350"

jobs:
  drip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Drip pages
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          LIMIT="${{ github.event.inputs.limit }}"
          if [ -z "$LIMIT" ]; then LIMIT=350; fi
          python drip.py "$LIMIT"
      - name: Commit new pages
        run: |
          git config user.name "page-bot"
          git config user.email "bot@users.noreply.github.com"
          git add output/
          git commit -m "Daily drip: new pages" || echo "No changes"
          git push
